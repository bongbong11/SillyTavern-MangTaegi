<div class="mt-container" style="padding: 10px;">
    <h3>📦 당신의 망태기 설정</h3>
    
    <div class="mt-section">
        <label>연결 API 프로필:</label>
        <select id="mt-api-type" class="text_node">
            <option value="gemini">Gemini (재미나이)</option>
            <option value="vertex">Vertex AI</option>
            <option value="express">Express Proxy</option>
        </select>
    </div>

    <div class="mt-section" style="margin-top: 10px;">
        <label>API 키:</label>
        <input type="password" id="mt-api-key" class="text_node" placeholder="API 키를 입력하세요">
        <button id="mt-save-settings" class="menu_button">설정 저장</button>
    </div>

    <hr>

    <h4>👥 수집된 NPC 목록</h4>
    <div id="mt-npc-list" style="max-height: 300px; overflow-y: auto;">
        <p style="font-size: 0.9em; color: #888;">수집된 데이터가 없습니다. 채팅창 하단의 망태기 아이콘을 눌러보세요.</p>
    </div>
</div>
