<div class="mt-ext-settings">
    <h3 style="color: var(--mb-accent);">📦 MangTaegi Quick Add</h3>
    <p style="font-size: 11px; margin-bottom: 12px; opacity: 0.8;">NPC를 수동으로 망태기에 넣습니다.</p>

    <input 
        id="mt-quick-input" 
        placeholder="NPC Name"
        style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--smart-line-color); background:rgba(0,0,0,0.1); color:inherit;"
    >

    <button 
        id="mt-quick-save"
        style="width:100%; padding:10px; background:#c17f5a; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold;"
    >
        수동 등록 (Save)
    </button>

    <div id="mt-quick-log" style="margin-top:10px; font-size:12px; color:#c17f5a; font-style:italic;"></div>
</div>
